      <stop stop-color="#6366F1"/>
      <stop offset="0.5" stop-color="#A855F7"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="hexGlow" x="-20%" y="-20%" width="140%" height="140%">
